{% extends "base.html" %}
{% block title %}Edit Expense #{{ expense.id }} — Expense Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Expense #{{ expense.id }}</h1>
    <p class="subtitle">Update the fields you want to change.</p>
</div>

<div class="form-card">
    <form action="{{ url_for('edit', expense_id=expense.id) }}" method="POST" novalidate>

        <div class="form-group">
            <label for="amount" class="form-label">Amount ($)</label>
            <div class="input-prefix-wrapper">
                <span class="input-prefix">$</span>
                <input type="number" id="amount" name="amount" class="form-input input-with-prefix" placeholder="0.00"
                    step="0.01" min="0.01" value="{{ expense.amount }}" />
            </div>
        </div>

        <div class="form-group">
            <label for="category" class="form-label">Category</label>
            <select id="category" name="category" class="form-select">
                {% for cat in categories %}
                <option value="{{ cat }}" {% if expense.category==cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="description" class="form-label">Description</label>
            <input type="text" id="description" name="description" class="form-input" maxlength="200"
                value="{{ expense.description }}" />
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Expense</button>
            <a href="{{ url_for('expenses') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
