<h1>Hello to the page</h1>
<form action="/" method="post">
    <input type="text" name="num1" required placeholder="Enter Number 1">
    <input type="text" name="num2" required placeholder="Enter Number 2">
    <button type="submit">Calculate</button>
</form>
{% if result %}
    <h2>Result: {{ result }}</h2>
{% endif %}
{% if error %}
    <h2>Error: {{ error }}</h2>
{% endif %}
