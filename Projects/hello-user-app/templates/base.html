<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Hello App{% endblock %}</title>

  <!-- Fonts: Playfair Display (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    /* ─── Design Tokens ──────────────────────────────────── */
    :root {
      --ink:       #0f0e0d;
      --paper:     #f9f6f0;
      --cream:     #f0ebe1;
      --gold:      #c9933a;
      --gold-lt:   #e8c87a;
      --muted:     #7a7167;
      --border:    #ddd7cc;
      --error:     #b84040;
      --success:   #3a7a52;
      --radius:    6px;
      --shadow:    0 4px 24px rgba(15,14,13,0.08);
      --font-body: 'DM Sans', sans-serif;
      --font-disp: 'Playfair Display', Georgia, serif;
    }

    /* ─── Base ───────────────────────────────────────────── */
    body {
      background-color: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Nav ────────────────────────────────────────────── */
    .nav {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: var(--font-disp);
      font-style: italic;
      font-size: 1.2rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a {
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--ink); }

    /* ─── Main ───────────────────────────────────────────── */
    main { flex: 1; }

    /* ─── Footer ─────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--ink); }
    .footer-badge {
      background: var(--cream);
      border: 1px solid var(--border);
      padding: 0.25rem 0.7rem;
      border-radius: 2rem;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
    }

    /* ─── Shared Components ──────────────────────────────── */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--ink);
      color: var(--paper);
    }
    .btn-primary:hover {
      background: #2a2825;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(15,14,13,0.18);
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    /* ─── Alert ──────────────────────────────────────────── */
    .alert {
      padding: 0.9rem 1.2rem;
      border-radius: var(--radius);
      font-size: 0.88rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .alert-error {
      background: #fdf2f2;
      border: 1px solid #f0cccc;
      color: var(--error);
    }

    /* ─── Page fade-in ───────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease both; }
    .fade-up-2 { animation: fadeUp 0.5s 0.1s ease both; }
    .fade-up-3 { animation: fadeUp 0.5s 0.2s ease both; }
    .fade-up-4 { animation: fadeUp 0.5s 0.3s ease both; }

    /* ─── Divider ────────────────────────────────────────── */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--gold);
      margin: 1.5rem 0;
      border-radius: 2px;
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body>

  <!-- ── Navigation ──────────────────────────────────────── -->
  <nav class="nav">
    <a href="/" class="nav-logo">Hello,&nbsp;<em>World.</em></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/history">History</a></li>
      <li><a href="/api/greetings" target="_blank">API</a></li>
    </ul>
  </nav>

  <!-- ── Page Content ────────────────────────────────────── -->
  <main>{% block content %}{% endblock %}</main>

  <!-- ── Footer ──────────────────────────────────────────── -->
  <footer>
    <span>Built with Flask · File-based storage</span>
    <span class="footer-badge">Hello App v1.0</span>
    <a href="/api/greetings">JSON API ↗</a>
  </footer>

</body>
</html>
