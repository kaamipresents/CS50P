<!DOCTYPE html>
<html>
<head>
  <title>Hello App</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    input { padding: 8px; font-size: 16px; width: 100%; margin-bottom: 10px; }
    button { padding: 10px 24px; font-size: 16px; background: #111; color: white; border: none; cursor: pointer; }
    .error { color: red; margin-bottom: 10px; }
    a { color: #111; }
  </style>
</head>
<body>

  <h1>👋 Hello App</h1>
  <p>Enter your name and get a greeting.</p>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form action="/greet" method="POST">
    <input type="text" name="name" placeholder="Your name" autofocus />
    <button type="submit">Greet me</button>
  </form>

  <br>
  <a href="/history">View history →</a>

</body>
</html>
